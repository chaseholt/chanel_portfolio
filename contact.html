<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Work With Me — Chanel Holt</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html,body{height:100%;margin:0;padding:0}
body{background:var(--red);overflow-x:hidden}

.wwm-page{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

/* Left — full-bleed photo */
.wwm-photo{
  position:relative;overflow:hidden;
}
.wwm-photo img{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
  display:block;
}

/* Right — red panel */
.wwm-panel{
  background:var(--red);
  display:flex;flex-direction:column;
  align-items:flex-start;justify-content:center;
  padding:80px 10% 80px 8%;
  gap:30px;
}

.wwm-title{
  display:flex;flex-direction:column;gap:0;
  line-height:1;
}
.wwm-script{
  font-family:var(--script);
  font-size:clamp(64px,8vw,120px);
  color:#3d0d0d;
  line-height:1.05;
  display:block;
}
.wwm-bold{
  font-family:var(--serif-display);
  font-size:clamp(44px,6vw,88px);
  font-weight:800;letter-spacing:-.02em;
  color:#3d0d0d;
  display:block;
  line-height:1;
}

.wwm-contacts{
  display:flex;flex-direction:column;gap:18px;margin-top:8px;
}
.wwm-contact-row{
  display:flex;align-items:center;gap:16px;
}
.wwm-contact-row .icon{
  width:44px;height:44px;flex-shrink:0;
  display:grid;place-items:center;
}
.wwm-contact-row .icon img{
  width:36px;height:36px;object-fit:contain;
}
.wwm-contact-row a,
.wwm-contact-row span{
  font-family:var(--serif-text);
  font-size:clamp(16px,1.8vw,22px);
  color:#fff;
  text-decoration:none;
  letter-spacing:.02em;
  border-bottom:1px solid transparent;
  transition:border-color .2s var(--ease);
}
.wwm-contact-row a:hover{border-bottom-color:rgba(255,255,255,.6)}

/* Envelope icon (CSS) */
.icon-envelope{
  width:36px;height:28px;position:relative;
}
.icon-envelope::before{
  content:"";position:absolute;inset:0;
  border:2px solid #fff;border-radius:3px;
}
.icon-envelope::after{
  content:"";position:absolute;
  top:0;left:0;right:0;height:50%;
  border-bottom:2px solid #fff;
  clip-path:polygon(0 0,50% 55%,100% 0);
  background:transparent;
}

/* Instagram icon (CSS ring) */
.icon-instagram{
  width:34px;height:34px;border:2px solid #fff;border-radius:8px;
  display:grid;place-items:center;
  position:relative;
}
.icon-instagram::before{
  content:"";width:14px;height:14px;border:2px solid #fff;border-radius:50%;
}
.icon-instagram::after{
  content:"";position:absolute;top:6px;right:6px;
  width:4px;height:4px;border-radius:50%;background:#fff;
}

@media (max-width:860px){
  .wwm-page{grid-template-columns:1fr;grid-template-rows:50vh auto}
  .wwm-photo{height:50vh}
  .wwm-panel{padding:60px 28px 80px;align-items:center;text-align:center}
  .wwm-contact-row{justify-content:center}
  .wwm-script{font-size:clamp(54px,14vw,100px)}
  .wwm-bold{font-size:clamp(38px,10vw,72px)}
}
</style>
</head>
<body>
<nav class="nav on-dark">
  <a class="brand" href="index.html#bag">Chanel</a>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul>
    <li><a href="about.html">About</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="content.html">Content</a></li>
    <li><a href="resume.html">Resume</a></li>
    <li><a href="contact.html" class="active">Work With Me</a></li>
  </ul>
</nav>

<main class="wwm-page">
  <div class="wwm-photo">
    <img src="assets/chanel-work-with-me.png" alt="Chanel Holt at an event">
  </div>
  <div class="wwm-panel">
    <div class="wwm-title">
      <span class="wwm-script">Work</span>
      <span class="wwm-bold">WITH ME</span>
    </div>
    <div class="wwm-contacts">
      <div class="wwm-contact-row">
        <span class="icon"><span class="icon-envelope"></span></span>
        <a href="mailto:Chanelholt@hotmail.com">Chanelholt@hotmail.com</a>
      </div>
      <div class="wwm-contact-row">
        <span class="icon"><span class="icon-instagram"></span></span>
        <a href="https://www.instagram.com/chanel.holt75/" target="_blank" rel="noopener">Chanel.holt75</a>
      </div>
    </div>
  </div>
</main>

<a class="back-to-bag" href="index.html#bag">
  <svg viewBox="0 0 16 16"><path d="M10 3 L4 8 L10 13"/></svg>
  <span>back to bag</span>
</a>
<script src="shared.js"></script>
</body>
</html>
