<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resume — Chanel Holt</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html,body{min-height:100%;margin:0;padding:0}
body{background:var(--red);color:#f6eee4;overflow-x:hidden}

.resume-page{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
  align-items:end;
  padding-top:92px;
}

/* Left — cutout photo + heading text */
.resume-left{
  display:flex;flex-direction:column;
  justify-content:flex-end;
  align-items:flex-start;
  padding:0 0 0 6%;
  position:relative;
}

.resume-heading{
  position:absolute;
  top:50%;transform:translateY(-50%);
  left:6%;
  z-index:2;
}
.resume-script{
  display:block;
  font-family:var(--script);
  font-size:clamp(48px,6vw,90px);
  color:#f6eee4;
  line-height:1.1;
}
.resume-bold{
  display:block;
  font-family:var(--serif-display);
  font-size:clamp(32px,4.5vw,68px);
  font-weight:800;letter-spacing:-.015em;
  color:#f6eee4;
  line-height:1;
}

.resume-cutout{
  width:min(380px,88%);
  margin-top:auto;
  position:relative;z-index:1;
}
.resume-cutout img{
  width:100%;height:auto;
  display:block;object-fit:contain;
  filter:drop-shadow(0 -10px 40px rgba(0,0,0,.25));
}

/* Right — gold frame + PDF */
.resume-right{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 6% 60px 4%;
  gap:24px;
}

.download{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 24px;border:1px solid #e9c77a;border-radius:999px;
  font-family:var(--serif-text);font-size:13px;letter-spacing:.25em;text-transform:uppercase;
  color:#e9c77a;transition:all .25s var(--ease);
}
.download:hover{background:#e9c77a;color:var(--red)}
.download svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* Gold frame */
.frame-outer{
  position:relative;width:100%;
  padding:22px;
  background:linear-gradient(135deg,#b9873d 0%,#e9c77a 18%,#f5e4b3 36%,#c9953f 56%,#e9c77a 80%,#8e6423 100%);
  box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.35) inset,0 0 0 2px rgba(255,240,200,.4) inset;
  border-radius:4px;
}
.frame-outer::before{
  content:"";position:absolute;inset:0;border-radius:4px;
  background:linear-gradient(135deg,rgba(255,240,200,.4),transparent 30%,transparent 70%,rgba(0,0,0,.35));
  mix-blend-mode:overlay;pointer-events:none;
}
.frame-inner{
  position:relative;z-index:2;
  background:#fbf7ed;
}

/* Decorative corner florets */
.corner{
  position:absolute;width:40px;height:40px;z-index:3;
  background:radial-gradient(circle at 50% 50%, #f5e4b3, #b9873d 70%, #6e4a1a);
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.4),inset 0 0 0 1.5px rgba(0,0,0,.25);
}
.corner::after{content:"";position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle at 40% 35%, rgba(255,245,220,.9), transparent 60%)}
.corner.tl{top:5px;left:5px}
.corner.tr{top:5px;right:5px}
.corner.bl{bottom:5px;left:5px}
.corner.br{bottom:5px;right:5px}

.pdf-frame{width:100%;aspect-ratio:8.5/11;border:0;background:#fff;display:block}

@media (max-width:860px){
  .resume-page{
    grid-template-columns:1fr;
    padding-top:76px;
    min-height:auto;
  }
  .resume-left{
    align-items:center;padding:40px 20px 0;
    flex-direction:row;justify-content:center;gap:20px;
  }
  .resume-heading{position:static;transform:none}
  .resume-cutout{width:min(180px,40%);margin-top:0}
  .resume-right{padding:40px 16px 80px}
  .frame-outer{padding:14px}
  .corner{width:28px;height:28px}
}
</style>
</head>
<body class="dark">
<nav class="nav on-dark">
  <a class="brand" href="index.html#bag">Chanel</a>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul>
    <li><a href="about.html">About</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="content.html">Content</a></li>
    <li><a href="resume.html" class="active">Resume</a></li>
    <li><a href="contact.html">Work With Me</a></li>
  </ul>
</nav>

<main class="resume-page">
  <div class="resume-left">
    <div class="resume-heading">
      <span class="resume-script">Check out</span>
      <span class="resume-bold">MY RESUME</span>
    </div>
    <div class="resume-cutout">
      <img src="assets/chanel-about-me.png" alt="Chanel Holt">
    </div>
  </div>

  <div class="resume-right">
    <a class="download" href="assets/resume.pdf" download>
      <svg viewBox="0 0 16 16"><path d="M8 2v10M4 8l4 4 4-4M2 14h12"/></svg>
      <span>Download PDF</span>
    </a>
    <div class="frame-outer">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="frame-inner">
        <iframe class="pdf-frame" src="assets/resume.pdf#view=FitH&toolbar=0" title="Chanel Holt Resume"></iframe>
      </div>
    </div>
  </div>
</main>

<a class="back-to-bag" href="index.html#bag">
  <svg viewBox="0 0 16 16"><path d="M10 3 L4 8 L10 13"/></svg>
  <span>back to bag</span>
</a>
<script src="shared.js"></script>
</body>
</html>
