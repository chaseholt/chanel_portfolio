<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resume — Chanel Holt</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html,body{min-height:100%;margin:0;padding:0}
body{background:var(--red);color:#f6eee4;overflow-x:hidden}

/* ─── Two-column page ─── */
.resume-page{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

/* ─── LEFT: heading + full-height cutout ─── */
.resume-left{
  position:relative;
  min-height:100vh;
  overflow:hidden;
}

.resume-heading{
  position:absolute;
  top:50%;transform:translateY(-55%);
  left:8%;z-index:3;pointer-events:none;
  line-height:1.1;
}
.resume-script{
  display:block;font-family:var(--script);
  font-size:clamp(52px,6.5vw,96px);
  color:#f6eee4;line-height:1.05;
}
.resume-bold{
  display:block;font-family:var(--serif-display);
  font-size:clamp(34px,4.8vw,72px);font-weight:800;letter-spacing:-.015em;
  color:#f6eee4;line-height:1;
}

/* Cutout: fills nearly the full left panel height, anchored to bottom */
.resume-cutout{
  position:absolute;
  bottom:0;left:0;right:0;
  height:92%;
  display:flex;align-items:flex-end;justify-content:center;
  z-index:2;
}
.resume-cutout img{
  height:100%;width:auto;
  display:block;
  object-fit:contain;object-position:bottom center;
  filter:drop-shadow(0 0 30px rgba(0,0,0,.3));
}

/* ─── RIGHT: download + framed PDF ─── */
.resume-right{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:108px 5% 60px;
  gap:18px;
}

.download{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 24px;border:1px solid #e9c77a;border-radius:999px;
  font-family:var(--serif-text);font-size:13px;letter-spacing:.25em;text-transform:uppercase;
  color:#e9c77a;transition:all .25s var(--ease);flex-shrink:0;
}
.download:hover{background:#e9c77a;color:var(--red)}
.download svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ─── Frame + iframe stacking ─── */
/*
  transparent-frame.png: 3277×4096 (ratio ~0.8)
  Pixel-inspected opening: top≈19%, left≈28%, right≈72.3%, bottom≈80.5%
  → opening: width≈44.3%, height≈61.5%
  Inset 1% each side for breathing room:
  → iframe: top:20%, left:29%, width:42%, height:60%
*/
.frame-wrap{
  position:relative;
  width:min(700px,90%);
  /* Lock height to the frame image's natural ratio so iframe % values stay correct */
  aspect-ratio:3277/4096;
}

/* PDF iframe lives BEHIND the frame image */
.pdf-frame{
  position:absolute;
  top:20%;left:29%;
  width:42%;height:60%;
  border:0;
  background:#fff;
  z-index:1;
  display:block;
}

/* Frame image overlaid on top — transparent PNG opening reveals iframe */
.frame-img{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  object-fit:fill;
  z-index:2;
  pointer-events:none;
  display:block;
  /* drop shadow gives the frame depth */
  filter:drop-shadow(0 20px 50px rgba(0,0,0,.55));
}

/* ─── Mobile ─── */
@media (max-width:860px){
  .resume-page{
    grid-template-columns:1fr;
    min-height:auto;
  }
  .resume-left{
    min-height:52vh;
  }
  .resume-heading{
    top:30%;transform:translateY(-50%);
    left:6%;
  }
  .resume-cutout{height:75%}
  .resume-right{padding:40px 16px 80px}
  .frame-wrap{width:min(500px,92%)}
}
</style>
</head>
<body class="dark">
<nav class="nav on-dark">
  <a class="brand" href="index.html#bag">Chanel</a>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul>
    <li><a href="about.html">About</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="content.html">Content</a></li>
    <li><a href="resume.html" class="active">Resume</a></li>
    <li><a href="contact.html">Work With Me</a></li>
  </ul>
</nav>

<main class="resume-page">

  <!-- LEFT: cutout photo fills the panel -->
  <div class="resume-left">
    <div class="resume-heading">
      <span class="resume-script">Check out</span>
      <span class="resume-bold">MY RESUME</span>
    </div>
    <div class="resume-cutout">
      <img src="assets/chanel-about-me.png" alt="Chanel Holt">
    </div>
  </div>

  <!-- RIGHT: framed PDF -->
  <div class="resume-right">
    <a class="download" href="assets/resume.pdf" download>
      <svg viewBox="0 0 16 16"><path d="M8 2v10M4 8l4 4 4-4M2 14h12"/></svg>
      <span>Download PDF</span>
    </a>
    <div class="frame-wrap">
      <!-- iframe behind the transparent frame -->
      <iframe
        class="pdf-frame"
        src="assets/resume.pdf#view=FitH&toolbar=0"
        title="Chanel Holt Resume">
      </iframe>
      <!-- gold frame overlaid; transparent PNG opening reveals iframe -->
      <img class="frame-img" src="assets/transparent-frame.png" alt="">
    </div>
  </div>

</main>

<a class="back-to-bag" href="index.html#bag">
  <svg viewBox="0 0 16 16"><path d="M10 3 L4 8 L10 13"/></svg>
  <span>back to bag</span>
</a>
<script src="shared.js"></script>
</body>
</html>
