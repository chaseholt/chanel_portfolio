<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resume — Chanel Holt</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body{background:var(--red-deep);color:#f6eee4}
.resume-wrap{
  min-height:calc(100vh - 72px);
  padding:172px 40px 120px;
  display:flex;flex-direction:column;align-items:center;gap:40px;
  position:relative;overflow:hidden;
}
.resume-wrap::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,220,140,.12), transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(0,0,0,.35), transparent 60%);
}
.resume-head{text-align:center;position:relative;z-index:1}
.resume-head .eyebrow{color:#e9c77a;margin:0}
.resume-head h1{
  font-family:var(--serif-display);
  font-size:clamp(54px,8vw,120px);
  font-style:italic;font-weight:700;line-height:.95;letter-spacing:-.02em;
  margin:4px 0 8px;color:#f6eee4;
}
.resume-head p{
  font-family:var(--serif-text);font-size:18px;color:rgba(246,238,228,.75);
  max-width:520px;margin:0 auto;letter-spacing:.02em;
}
.download{
  display:inline-flex;align-items:center;gap:10px;margin-top:18px;
  padding:12px 26px;border:1px solid #e9c77a;border-radius:999px;
  font-family:var(--serif-text);font-size:14px;letter-spacing:.25em;text-transform:uppercase;
  color:#e9c77a;transition:all .25s var(--ease);position:relative;z-index:1;
}
.download:hover{background:#e9c77a;color:var(--red-deep)}
.download svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* Gold frame around resume */
.frame-outer{
  position:relative;z-index:1;
  width:min(900px,95vw);
  padding:26px;
  background:
    linear-gradient(135deg,#b9873d 0%,#e9c77a 18%,#f5e4b3 36%,#c9953f 56%,#e9c77a 80%,#8e6423 100%);
  box-shadow:
    0 40px 80px rgba(0,0,0,.55),
    0 0 0 1px rgba(0,0,0,.35) inset,
    0 0 0 2px rgba(255,240,200,.4) inset;
  border-radius:4px;
}
.frame-outer::before,.frame-outer::after{
  content:"";position:absolute;pointer-events:none;
  background:
    linear-gradient(135deg,rgba(255,240,200,.4),transparent 30%,transparent 70%,rgba(0,0,0,.35));
  mix-blend-mode:overlay;
}
.frame-outer::before{inset:0;border-radius:4px}
.frame-outer::after{
  inset:14px;
  border-radius:2px;
  background:
    linear-gradient(135deg,#8e6423 0%,#c9953f 30%,#e9c77a 50%,#b9873d 70%,#6e4a1a 100%);
}
.frame-inner{
  position:relative;z-index:2;
  background:#fbf7ed;
  padding:0;
  box-shadow:inset 0 0 0 1px rgba(142,100,35,.4);
}
/* Decorative corner florets */
.corner{
  position:absolute;width:48px;height:48px;z-index:3;
  background:
    radial-gradient(circle at 50% 50%, #f5e4b3, #b9873d 70%, #6e4a1a);
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.4),inset 0 0 0 1.5px rgba(0,0,0,.25);
}
.corner::after{
  content:"";position:absolute;inset:10px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%, rgba(255,245,220,.9), transparent 60%);
}
.corner.tl{top:6px;left:6px}
.corner.tr{top:6px;right:6px}
.corner.bl{bottom:6px;left:6px}
.corner.br{bottom:6px;right:6px}

.pdf-frame{
  width:100%;aspect-ratio: 8.5/11;border:0;
  background:#fff;display:block;
}
@media (max-width:860px){
  .resume-wrap{padding:126px 16px 100px}
  .frame-outer{padding:14px}
  .frame-outer::after{inset:8px}
  .corner{width:32px;height:32px}
}
</style>
</head>
<body class="dark">
<nav class="nav on-dark">
  <a class="brand" href="index.html">Chanel</a>
  <ul>
    <li><a href="about.html">About</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="content.html">Content</a></li>
    <li><a href="resume.html">Resume</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<main class="page resume-wrap">
  <header class="resume-head">
    <p class="eyebrow">the whole picture</p>
    <h1>Resume</h1>
    <p>The full story — experience, skills, and education, framed in gold.</p>
    <a class="download" href="assets/resume.pdf" download>
      <svg viewBox="0 0 16 16"><path d="M8 2v10M4 8l4 4 4-4M2 14h12"/></svg>
      <span>Download PDF</span>
    </a>
  </header>
  <div class="frame-outer">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="frame-inner">
      <iframe class="pdf-frame" src="assets/resume.pdf#view=FitH&toolbar=0" title="Chanel Holt Resume"></iframe>
    </div>
  </div>
</main>
<a class="back-to-bag" href="index.html#bag">
  <svg viewBox="0 0 16 16"><path d="M10 3 L4 8 L10 13"/></svg>
  <span>back to bag</span>
</a>
<script src="shared.js"></script>
</body>
</html>
