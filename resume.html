<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resume — Chanel Holt</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html,body{min-height:100%;margin:0;padding:0}
body{background:var(--red);color:#f6eee4;overflow-x:hidden}

.resume-page{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
  align-items:stretch;
}

/* ── Left panel ── */
.resume-left{
  position:relative;
  display:flex;flex-direction:column;
  justify-content:flex-end;align-items:flex-start;
  padding-top:92px;overflow:hidden;
}

.resume-heading{
  position:absolute;
  top:50%;transform:translateY(-60%);
  left:8%;z-index:2;pointer-events:none;
}
.resume-script{
  display:block;font-family:var(--script);
  font-size:clamp(52px,6.5vw,96px);color:#f6eee4;line-height:1.05;
}
.resume-bold{
  display:block;font-family:var(--serif-display);
  font-size:clamp(34px,4.8vw,72px);font-weight:800;letter-spacing:-.015em;
  color:#f6eee4;line-height:1;
}

/* Cutout — almost as tall as the frame on the right */
.resume-cutout{
  position:relative;z-index:1;
  width:auto;
  /* fills from bottom of panel; height keyed to vh so it matches the frame height */
  height:calc(100vh - 92px);
  align-self:flex-end;
  margin-left:5%;
}
.resume-cutout img{
  height:100%;width:auto;display:block;
  object-fit:contain;object-position:bottom left;
  filter:drop-shadow(0 -8px 30px rgba(0,0,0,.3));
}

/* ── Right panel ── */
.resume-right{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:100px 6% 60px 4%;
  gap:20px;
}

.download{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 24px;border:1px solid #e9c77a;border-radius:999px;
  font-family:var(--serif-text);font-size:13px;letter-spacing:.25em;text-transform:uppercase;
  color:#e9c77a;transition:all .25s var(--ease);
}
.download:hover{background:#e9c77a;color:var(--red)}
.download svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ── Transparent image frame ── */
.frame-wrap{
  position:relative;
  width:100%;
}
/* The frame image sits on top of the PDF via z-index */
.frame-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:fill;
  z-index:2;pointer-events:none;
  /* frame has slight shadow */
  filter:drop-shadow(0 30px 60px rgba(0,0,0,.5));
}
/* PDF iframe sits behind the frame image; inset to land inside the frame opening */
/* transparent-frame.webp opening is approx 14% from each side, 16% top, 14% bottom */
.pdf-frame{
  position:relative;z-index:1;
  display:block;
  width:76%;
  aspect-ratio:8.5/11;
  border:0;
  background:#fbf7ed;
  margin:0 auto;
  /* push it down to sit inside the frame opening */
  margin-top:14%;margin-bottom:10%;
}

@media (max-width:860px){
  .resume-page{
    grid-template-columns:1fr;
    min-height:auto;
  }
  .resume-left{
    flex-direction:row;align-items:flex-end;justify-content:flex-start;
    gap:16px;padding:76px 20px 0;min-height:42vh;overflow:visible;
  }
  .resume-heading{position:static;transform:none;flex-shrink:0}
  .resume-cutout{height:36vh;margin-left:auto;margin-right:0}
  .resume-right{padding:30px 16px 80px}
  .pdf-frame{margin-top:12%;margin-bottom:8%}
}
</style>
</head>
<body class="dark">
<nav class="nav on-dark">
  <a class="brand" href="index.html#bag">Chanel</a>
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul>
    <li><a href="about.html">About</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="content.html">Content</a></li>
    <li><a href="resume.html" class="active">Resume</a></li>
    <li><a href="contact.html">Work With Me</a></li>
  </ul>
</nav>

<main class="resume-page">
  <div class="resume-left">
    <div class="resume-heading">
      <span class="resume-script">Check out</span>
      <span class="resume-bold">MY RESUME</span>
    </div>
    <div class="resume-cutout">
      <img src="assets/chanel-about-me.png" alt="Chanel Holt">
    </div>
  </div>

  <div class="resume-right">
    <a class="download" href="assets/resume.pdf" download>
      <svg viewBox="0 0 16 16"><path d="M8 2v10M4 8l4 4 4-4M2 14h12"/></svg>
      <span>Download PDF</span>
    </a>
    <div class="frame-wrap">
      <iframe class="pdf-frame" src="assets/resume.pdf#view=FitH&toolbar=0" title="Chanel Holt Resume"></iframe>
      <img class="frame-img" src="assets/transparent-frame.webp" alt="">
    </div>
  </div>
</main>

<a class="back-to-bag" href="index.html#bag">
  <svg viewBox="0 0 16 16"><path d="M10 3 L4 8 L10 13"/></svg>
  <span>back to bag</span>
</a>
<script src="shared.js"></script>
</body>
</html>
